# ─── Level 4: Cross-checks ──────────────────────────────────────────

- id: UF_030
  name: "Cross-check: Chat revenue matches DCL direct query"
  level: cross_check
  type: comparison
  query_a:
    method: POST
    service: nlq
    path: "/api/v1/query"
    body:
      question: "what is revenue for Q1 2025"
      entity_id: "meridian"
      data_mode: "live"
    extract: "value"
  query_b:
    method: POST
    service: dcl
    path: "/api/dcl/query"
    body:
      metric: "revenue"
      entity_id: "meridian"
      time_range:
        start: "2025-Q1"
        end: "2025-Q1"
    extract: "data.0.value"
  assertions:
    - operator: values_equal
      tolerance: 0.01
      description: "NLQ chat and DCL direct must return the same revenue"

- id: UF_031
  name: "Cross-check: NLQ source is 'dcl' in live mode"
  level: cross_check
  method: POST
  service: nlq
  path: "/api/v1/query"
  body:
    question: "what is revenue"
    data_mode: "live"
  assertions:
    - field: data_source
      operator: equals
      expected: "dcl"

- id: UF_032
  name: "Cross-check: No query returns source=Local in live mode"
  level: cross_check
  method: POST
  service: nlq
  path: "/api/v1/query"
  body:
    question: "2025 P&L"
    data_mode: "live"
  assertions:
    - field: data_source
      operator: not_equals
      expected: "Local"
    - field: data_source
      operator: not_equals
      expected: "local"
