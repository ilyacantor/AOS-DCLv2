# User-Facing Test Suite
# Every test hits NLQ — the same path the user uses.
# If a test passes but the UI is broken, the test is wrong.

# ─── Level 1: Chat ────────────────────────────────────────────────────

- id: UF_001
  name: "Chat: 'what is revenue' returns a number > $0"
  level: chat
  method: POST
  service: nlq
  path: "/api/v1/query"
  body:
    question: "what is revenue for Q1 2025"
    data_mode: "live"
  assertions:
    - field: value
      operator: not_null
    - field: value
      operator: greater_than
      expected: 0
    - field: data_source
      operator: equals
      expected: "dcl"
    - field: answer
      operator: not_contains
      expected: "stumped"
    - field: answer
      operator: not_contains
      expected: "head-scratcher"
    - field: answer
      operator: not_contains
      expected: "don't have"

- id: UF_002
  name: "Chat: 'what is revenue' returns Meridian-scale number (>$500M)"
  level: chat
  method: POST
  service: nlq
  path: "/api/v1/query"
  body:
    question: "what is revenue for Q1 2025"
    data_mode: "live"
  assertions:
    - field: value
      operator: greater_than
      expected: 500

- id: UF_003
