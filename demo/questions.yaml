# Eval question slots for the Semantics-vs-Context tier demo (§13).
#
# This file is DATA — the sequence layer reads it; nothing here executes.
#
# The slots are organized by CAPABILITY CLASS, not by metric. The thesis is the
# seam: Semantics (base) serves trustworthy resolved facts; Context (premium)
# answers the questions that only exist ACROSS relationships, conflict, or time —
# the answers flat retrieval cannot assemble. Each live slot is a base-vs-premium
# pair where the premium panel shows the answer CHANGING (or, on the Fact class,
# shows base is already sufficient — that is the teaching point, not a weakness).
#
# Slot statuses:
#   live    — runs now against the live dev entity; scored.
#   pending — the beat whose scenario data has not landed yet (Gate 1A). Presented
#             honestly as pending; output is NEVER faked, never simulated.
#
# Ground truth is resolved at RUN TIME from the raw source feeds (demo/feeds.py —
# B10) for numeric slots, and from the live Conflict Register for conflict slots.
# No expected values are hardcoded here. target_concept on a conflict slot is the
# REGISTERED concept id the disclosure is scored against (not a global match).
# scales: accepted unit multipliers when matching a number extracted from an
# answer (feeds are $M-scale; rates may be verbalized as 0.114 or 11.4%).

meta:
  entity_default: ContextOSDemo
  model_default: claude-opus-4-8
  seed_derivation: "uuid5(NAMESPACE_URL, 'fin-seed:{entity_id}') % 2**31"
  rel_tolerance: 0.02

slots:
  # ===== CONNECTION (hero) — the answer lives in no single record =====
  - id: q_connection_attrition
    status: live
    kind: connection
    question: "Where is attrition highest, and what's driving it?"
    notes: >-
      THE HERO. The driver exists only in the join of org structure → team →
      compensation band → external market; no single record holds it. Premium
      walks the derived entity graph (traverse_graph over entity_edges) and returns
      the concentration (a team) and the cross-source driver (the BELOW_MARKET comp
      gap and/or the dominant exit theme). Base has the SAME resolved facts — roster,
      exit reasons, internal comp, external market — reachable over the same MCP, but
      no traversal tool, so it can only present them as separate lists and must say
      plainly that it cannot assemble them into a driver. This is a TIER gap, not a
      data gap. Scored (score_connection): premium must call traverse_graph AND ground
      the answer in graph content (a team/department node AND a market-gap or
      exit-theme driver that appeared in the traverse_graph result). Underlying
      numbers resolve live (B10); the comp gap is whatever the graph holds at run time.

  # ===== CONFLICT (decisive value) — the answer needs arbitration =====
  - id: q_conflict_attrition_rate
    status: live
    kind: conflict
    target_concept: "workforce.attrition_rate"
    question: "Your source systems report different attrition for the company — what's the decisive figure, and which source wins?"
    notes: >-
      A real VALUE conflict in the live Register: concept workforce.attrition_rate,
      sources netsuite_finance_rollup vs workday_hr disagree on the rate. Premium calls
      conflict_query on workforce.attrition_rate (+ reconciliation_recommend), names the
      disagreeing sources, gives the decisive reconciled value, and cites the authority.
      Base can retrieve both source values via query_triples and state that they differ,
      but has NO arbitration tool — it cannot produce the decisive value. Scored
      (score_conflict) against the live Register FOR THIS CONCEPT ONLY (target_concept,
      not a global match): premium must have called conflict_query AND named the
      disagreeing sources for workforce.attrition_rate. The question does not pre-name
      the sources — naming them is part of the answer.

  # ===== FACT (base succeeds) — resolved, governed, provenanced =====
  - id: q_fact_revenue
    status: live
    kind: numeric
    question: "What was total revenue in the most recent quarter?"
    ground_truth: {feed: financial, field: revenue, period: latest, scales: [1, 1000]}
    notes: >-
      The seam from the BASE side. A resolved, governed fact: Semantics returns it
      correctly, with provenance (source system / lineage). Premium returns the same
      value — there is nothing to traverse or arbitrate. BOTH pass; that is the point.
      The teaching moment: you do not pay for the premium tier to answer this — the base
      tier is sufficient and trustworthy. Base correctness is the headline here (base
      must pass). Ground truth resolves live from the financial feed (B10).

  - id: q_fact_arr
    status: live
    kind: numeric
    question: "What is ending ARR for the most recent quarter?"
    ground_truth: {feed: operational, field: arr_ending, period: latest, scales: [1, 1000]}
    notes: >-
      Second Fact slot — another clean resolved figure where the base tier is fully
      sufficient. Reinforces that Semantics is a real, trustworthy base, not a
      crippled teaser for the premium tier. Both panels pass.

  # ===== ABSENCE (honesty) — both tiers honest, neither fabricates =====
  - id: q_no_data_enps
    status: live
    kind: no_data
    question: "What is the employee NPS (eNPS) for the most recent quarter?"
    notes: >-
      No source produces employee-NPS for any records-path entity (customer 'nps'
      exists; employee NPS does not). The honest outcome IS the feature: both tiers
      state the absence plainly — no estimate, no filler. A fabricated number here is
      a scoring failure for either tier.

  # ===== TIME / as-of (pending) — arrives with Gate 1A scenario data =====
  - id: q_time_asof
    status: pending
    kind: time
    question: "What was headcount as of the close of the prior quarter — the figure as it was reported then, not today's restated number?"
    pending_reason: >-
      As-of / point-in-time answering needs scenario data where a value was reported,
      later restated, and BOTH versions are retained with valid-time. That dataset
      (Gate 1A) is not yet in Farm, so this slot is presented honestly as pending. It
      runs the day the data exists; it is never simulated.
