# Eval question slots for the grounded-agent before/after demo (§13).
#
# This file is DATA — the sequence layer reads it; nothing here executes.
# Slot statuses:
#   live    — runs now against the live dev entity; scored.
#   pending — the §13 beat whose scenario data arrives with Gate 1A demo
#             datasets (Farm conflict-class months). The slot is presented
#             honestly as pending; output is NEVER faked.
#
# Ground truth is resolved at RUN TIME from the raw source feeds
# (demo/feeds.py — B10). No expected values are hardcoded here.
# scales: accepted unit multipliers when matching a number extracted from
# an answer (feeds are $M-scale; an agent may verbalize $1.48B for 1477.13;
# rates may be verbalized as 0.058 or 5.8%).

meta:
  entity_default: ContextOSDemo
  model_default: claude-opus-4-8
  seed_derivation: "uuid5(NAMESPACE_URL, 'fin-seed:{entity_id}') % 2**31"
  rel_tolerance: 0.02

slots:
  - id: q1_attrition_headline
    status: live
    kind: conflict
    question: "Where is attrition highest and what's driving it?"
    notes: >-
      §13 Q1 (headline). The Farm conflict-scenario months are live: an
      HR-system feed (workday_hr) and a finance cost-center rollup
      (netsuite_finance_rollup) legitimately disagree on headcount —
      contractor classification, terminations not yet cleared from payroll,
      org-unit mapping — so derived attrition differs (~22% vs ~19% in the
      headline month). Both raw files are in Panel A's feed set
      (hr_headcount / finance_headcount); the Register carries the
      workforce.* conflicts DCL's engine detected from the ingested feeds.
      Scored against the live Register: disclosure must name the disagreeing
      sources. Ground truth for the underlying values resolves from the
      feeds at run time (B10); per-month detail (incl. the conflict-free
      month) lives in GET /api/farm/scenario/ground-truth.

  - id: q2_cloud_conflict
    status: live
    kind: conflict
    question: "What was March compute spend for the entity — billing or GL?"
    notes: >-
      §13 Q2. Dual cloud-spend scenario feeds are live: provider billing
      (aws_billing) vs GL allocation (netsuite_gl_allocation) disagree on
      monthly compute spend ($412K-class vs $387K-class in 2026-03),
      decomposable into untagged resources + credit posting lag + a small
      honest unexplained remainder (decomposition in
      GET /api/farm/scenario/ground-truth). Both raw files are in Panel A's
      feed set (billing_cloud / gl_cloud); the Register carries the
      cloud_spend.* per-month conflicts DCL's engine detected. Scored
      against the live Register: disclosure must name the disagreeing
      sources.

  - id: q_revenue
    status: live
    kind: numeric
    question: "What was total revenue in the most recent quarter?"
    ground_truth: {feed: financial, field: revenue, period: latest, scales: [1, 1000]}

  - id: q_net_income
    status: live
    kind: numeric
    question: "What was net income in the most recent quarter?"
    ground_truth: {feed: financial, field: net_income, period: latest, scales: [1, 1000]}

  - id: q_cash
    status: live
    kind: numeric
    question: "What was the cash position at the end of the most recent quarter?"
    ground_truth: {feed: financial, field: cash, period: latest, scales: [1, 1000]}

  - id: q_headcount
    status: live
    kind: numeric
    question: "What is total company headcount in the latest month on record?"
    # Workforce is owned by the §13 scenario (monthly roster). Ground truth is the
    # HR lens at the conflict-free month (2026-06), where workday_hr and the finance
    # rollup agree exactly (210) — an unambiguous single value for a clean retrieval.
    ground_truth: {feed: hr_headcount, field: headcount_total, period: "2026-06", scales: [1]}

  - id: q_arr
    status: live
    kind: numeric
    question: "What is ending ARR for the most recent quarter?"
    ground_truth: {feed: operational, field: arr_ending, period: latest, scales: [1, 1000]}

  - id: q_attrition_live
    status: live
    kind: numeric
    question: "What is the company-wide attrition rate in the latest month on record?"
    # HR-lens attrition at the conflict-free month (2026-06): workday_hr and the
    # finance rollup agree (11.43% annualized), so the value is unambiguous. The
    # scenario owns the workforce domain; this is its clean monthly figure.
    ground_truth: {feed: hr_headcount, field: attrition_rate, period: "2026-06", scales: [1, 0.01, 100]}

  - id: q_enps_no_data
    status: live
    kind: no_data
    question: "What is the employee NPS (eNPS) for the most recent quarter?"
    notes: >-
      No source produces employee-NPS for any records-path entity (customer
      'nps' exists; employee NPS does not). The honest answer is that the
      data is absent — the no-data tile renders that honestly. A fabricated
      number here is a scoring failure.

  - id: q_conflict_live
    status: live
    kind: conflict
    question: "Do your source systems disagree about any customer records for this entity?"
    notes: >-
      Scored against the live Conflict Register (Gate 1A) at run time: the
      expected disclosure set is GET /api/dcl/conflicts for the entity at
      sequence start. Panel B carries conflict_query in its token scope.
      Panel A's raw surface is the pull-accessible feeds (financial /
      operational / ledger); the fabric planes (e.g. confluent vs workato
      customer rows) are push-class with no pull endpoint — raw access has
      no cross-source register, which is precisely the before-condition.
      This asymmetry is stated here and in the capture, not hidden.
