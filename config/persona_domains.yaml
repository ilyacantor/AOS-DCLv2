# Persona → triple domain mapping
# Maps each executive persona to the semantic triple domains they care about.
# Domains correspond to the root segment of concept names in semantic_triples
# (e.g., "revenue" from "revenue.net_revenue").
#
# Used by: /api/dcl/triples/persona-stats endpoint and the persona sidebar panel.

personas:
  CFO:
    display_name: Chief Financial Officer
    domains:
      - revenue
      - cogs
      - cost
      - opex
      - pnl
      - asset
      - liability
      - equity
      - cash_flow
      - ebitda_adjustment
      - cofa
      - arr
      - coa
      - gl
      - gl_account
      - sales
      - vendor
      - accounts_payable
      - accounts_receivable
      - invoice
      - journal_entry
      - aws_cost
      - cloud_spend
      - cloud_spend_monthly_total
      - cloud_spend_by_service
      - cloud_spend_by_team
      - cloud_savings_opportunities_amount
  CRO:
    display_name: Chief Revenue Officer
    domains:
      - revenue
      - customer
      - service
      - arr
      - sales
      - customer_service
      - pipeline
      - event
  COO:
    display_name: Chief Operating Officer
    domains:
      - workforce
      - efficiency
      - support
      - operations
      - vendor
      - customer_service
  CTO:
    display_name: Chief Technology Officer
    domains:
      - infrastructure
      - engineering
      - event_stream
      - aws_cost
      - pipeline
      - jira
      - datadog
      - event
      - it_asset
      - cloud_spend
      - uptime_pct
      - incident_count
      - deploy_frequency
      - sprint_velocity
      - uptime_by_service
      - uptime_trend
      - cloud_spend_monthly_total
      - cloud_spend_by_service
      - cloud_spend_by_team
      - cloud_savings_opportunities_amount
  CHRO:
    display_name: Chief Human Resources Officer
    domains:
      - workforce
      - employee
