# Persona → triple domain mapping
# Maps each executive persona to the semantic triple domains they care about.
# Domains correspond to the root segment of concept names in semantic_triples
# (e.g., "revenue" from "revenue.net_revenue").
#
# Used by: /api/dcl/triples/persona-stats endpoint and the persona sidebar panel.

personas:
  CFO:
    display_name: Chief Financial Officer
    domains:
      - revenue
      - cogs
      - cost
      - opex
      - pnl
      - asset
      - liability
      - equity
      - cash_flow
      - ebitda_adjustment
      - cofa
      - arr
      - coa
      - gl
      - gl_account
      - sales
      - vendor
      - accounts_payable
      - accounts_receivable
      - invoice
      - journal_entry
      - aws_cost
      - cloud_spend
      - cloud_spend_monthly_total
      - cloud_spend_by_service
      - cloud_spend_by_team
      - cloud_savings_opportunities_amount
  CRO:
    display_name: Chief Revenue Officer
    domains:
      - revenue
      - customer
      # account.* = CRM account/customer records (Farm salesforce generator).
      # Was unmapped → 422 UNMAPPED_DOMAIN at ingest (farm_deferred_work.md#11).
      - account
      - service
      - arr
      - sales
      - customer_service
      - pipeline
      - event
      # CRM-path manifest concepts (Farm salesforce/billing generators) —
      # unmapped → 422 UNMAPPED_DOMAIN at ingest (farm_deferred_work.md#11).
      - opportunity
      - subscription
  COO:
    display_name: Chief Operating Officer
    domains:
      - workforce
      - headcount
      - efficiency
      - support
      - operations
      - vendor
      - customer_service
      # CRM-path manifest concepts (farm_deferred_work.md#11).
      - compensation
      - position
      - ticket
  CTO:
    display_name: Chief Technology Officer
    domains:
      - infrastructure
      - engineering
      - event_stream
      - aws_cost
      - pipeline
      # CRM-path manifest concepts (farm_deferred_work.md#11).
      - health
      - engineering_work
      - aws_resource
      - jira
      - datadog
      - event
      - it_asset
      - cloud_spend
      - uptime_pct
      - incident_count
      - deploy_frequency
      - sprint_velocity
      - uptime_by_service
      - uptime_trend
      - cloud_spend_monthly_total
      - cloud_spend_by_service
      - cloud_spend_by_team
      - cloud_savings_opportunities_amount
  CHRO:
    display_name: Chief Human Resources Officer
    domains:
      - workforce
      - headcount
      - employee
      # "What's driving attrition" concepts: trailing-window exit themes ride the
      # workforce root (workforce.exit_theme.*); the comp-gap pair are their own
      # roots — internal comp band vs external market benchmark (cross-source).
      - comp_band
      - market_benchmark
